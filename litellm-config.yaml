model_list:
  # Production-compatible Sonnet alias. Active production uses ops/graphify/.
  - model_name: claude-sonnet-4-5
    litellm_params:
      model: bedrock/us.anthropic.claude-sonnet-4-5-20250929-v1:0
      aws_region_name: us-east-1

  # Legacy Opus alias kept only for controlled experiments, not production.
  - model_name: claude-opus-4-6
    litellm_params:
      model: bedrock/us.anthropic.claude-opus-4-6-v1
      aws_region_name: us-east-1

  # Fallback local Ollama (sigue corriendo en el stack)
  - model_name: qwen2.5-coder-local
    litellm_params:
      model: ollama/qwen2.5-coder:7b
      api_base: http://ollama:11434

# Auto-fallback si Bedrock falla (rate limit, network, etc.)
litellm_settings:
  fallbacks:
    - claude-sonnet-4-5: ["qwen2.5-coder-local"]
    - claude-opus-4-6: ["qwen2.5-coder-local"]
  request_timeout: 300
  num_retries: 2
  drop_params: true
  additional_drop_params:
    - keep_alive
    - options
  set_verbose: false
  # Callback strips markdown fences and short preambles without fabricating JSON.
  callbacks: litellm_strip_markdown.proxy_handler_instance

# General settings
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
