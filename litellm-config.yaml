model_list:
  # Alias que Graphify ya usa (no requiere cambio en Graphify)
  - model_name: qwen2.5-coder:7b
    litellm_params:
      model: bedrock/us.anthropic.claude-opus-4-6-v1
      aws_region_name: us-east-1

  # Alias adicional explícito por si queremos referenciarlo directamente
  - model_name: claude-opus-4-6
    litellm_params:
      model: bedrock/us.anthropic.claude-opus-4-6-v1
      aws_region_name: us-east-1

  # Fallback local Ollama (sigue corriendo en el stack)
  - model_name: qwen2.5-coder-local
    litellm_params:
      model: ollama/qwen2.5-coder:7b
      api_base: http://ollama:11434

# Auto-fallback si Bedrock falla (rate limit, network, etc.)
litellm_settings:
  fallbacks:
    - qwen2.5-coder:7b: ["qwen2.5-coder-local"]
    - claude-opus-4-6: ["qwen2.5-coder-local"]
  request_timeout: 600           # 10 min — Opus puede tomar tiempo en outputs largos
  num_retries: 2
  set_verbose: false             # subir a true si debug
  # Callback que strip markdown fences (```json ... ```) del response de Claude
  # Crítico: Graphify hace json.loads(content) directo, Claude wrappea en markdown
  # NOTA: debe ser STRING (no lista) para custom CustomLogger callbacks
  callbacks: litellm_strip_markdown.proxy_handler_instance

# General settings
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL  # opcional — para spend tracking persistent
